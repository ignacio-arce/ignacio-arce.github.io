---
layout: contact
title: iaSoftware - Contacto
---

<div class="row row-content align-items-center">
    <div class="col-12 col-sm-4">

        <h2>Contactenos!</h2>
        <p>
            Escuchamos su propuesta, analizamos si es viable
            y nos pondremos en contacto con usted para hacer el trabajo.
        </p>
        <p>
            Complete el <b><em>formulario</em></b>
            para enviarnos un mensaje.
        </p>
    </div>
    <div class="col-12 col-sm">
        <form id="gform" method="POST" class="pure-form pure-form-stacked" 
            action="https://script.google.com/macros/s/AKfycbwV6pjaIfuRE2QCHcuB9NJ_GR6Tmmi_e48xF4UsGvXh-4hrMk4/exec">
            <div class="form-group">
                <label for="name">Nombre: </label>
                <input type="text" class="form-control" name="name" id="name" placeholder="Introduzca su nombre completo" required>
            </div>
            <div class="form-group">
                <label for="message">Mensaje: </label>
                <textarea id="message" name="message"  placeholder="Escriba su consulta aquí" rows="10" class="form-control" rows="5" required></textarea>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="Ingrese su correo electrónico">
            </div>

            <br>
            <button type="submit" class="btn btn-primary"><i class="fa fa-paper-plane"></i>&nbsp;Enviar</button>

        </form>

        <!-- Customise the Thankyou Message People See when they submit the form: -->
        <div style="display:none;" id="thankyou_message">
            <h2>
                <em>Gracias</em> por contactarnos, nos comunicaremos con usted a la brevedad
            </h2>
        </div>
    </div>
</div>
