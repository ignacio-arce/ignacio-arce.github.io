---
layout: default
title: iaSoftware - Contacto
---

<div class="row row-content align-items-center">
    <div class="col-12 col-md-4">

        <h2>{% t contact.title %}</h2>
        <p>
            {% t contact.p1 %}
        </p>
        <p>
            {% t contact.p2 %}
        </p>
    </div>
    <div class="col-12 col-sm">
        <form id="form" method="POST" class="pure-form pure-form-stacked" action="{{ site.api.url }}/mailgun">
            <div id="form-elements">
                <div class="form-group">
                    <label for="name">{% t contact.form.name %}</label>
                    <input type="text" lang="{{site.lang}}" class="form-control" name="subject" id="subject"
                        placeholder="{% t contact.placeholder.name %}" required>
                </div>
                <div class="form-group">
                    <label for="text">{% t contact.form.message %}</label>
                    <textarea id="text" lang="{{site.lang}}" name="text"
                        placeholder="{% t contact.placeholder.message %}" rows="10" class="form-control" rows="5"
                        required></textarea>
                </div>
                <div class="form-group">
                    <label for="from">{% t contact.form.email %}</label>
                    <input type="email" lang="{{site.lang}}" id="from" name="from" class="form-control" required
                        placeholder="{% t contact.placeholder.email %}">
                </div>
                <br />
                <button id="submit-btn" type="submit" class="btn btn-primary"><i
                        class="fa fa-paper-plane"></i>&nbsp;{% t contact.form.button %}</button>
            </div>
            <div style="display:none;" id="thankyou-message">
                <h2>
                    {% t contact.form.thanks %}
                </h2>
            </div>
            <div id="modal" class="modal fade" tabindex="-1" role="dialog" aria-labelledby="mySmallModalLabel"
                aria-hidden="true" data-backdrop="true">
                <div class="d-flex justify-content-center">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="spinner-border texr-light" role="status">
                            <span class="sr-only">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
